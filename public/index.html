<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛博雪峰 - 思维顾问</title>
  <link rel="stylesheet" href="/css/tailwind.generated.css">
  <script src="/vendor/mini-markdown.js"></script>
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
    }
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .auth-overlay.hidden {
      display: none;
    }
    .chat-container::-webkit-scrollbar { width: 6px; }
    .chat-container::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    .message-enter { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .typing-indicator span {
      animation: blink 1.4s infinite;
      animation-fill-mode: both;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }
    .md-content h1, .md-content h2, .md-content h3 {
      font-weight: 700;
      line-height: 1.4;
      margin: 0.8em 0 0.4em;
    }
    .md-content h1 { font-size: 1.125rem; }
    .md-content h2 { font-size: 1rem; }
    .md-content h3 { font-size: 0.95rem; }
    .md-content p { margin: 0.5em 0; }
    .md-content ul, .md-content ol {
      margin: 0.5em 0;
      padding-left: 1.25rem;
    }
    .md-content li { margin: 0.25em 0; }
    .md-content blockquote {
      margin: 0.75em 0;
      padding-left: 0.75rem;
      border-left: 3px solid #fdba74;
      color: #6b7280;
    }
    .md-content code {
      padding: 0.1rem 0.35rem;
      border-radius: 0.375rem;
      background: #f3f4f6;
      font-size: 0.9em;
    }
    .md-content pre {
      overflow-x: auto;
      margin: 0.75em 0;
      padding: 0.75rem;
      border-radius: 0.75rem;
      background: #111827;
      color: #f9fafb;
    }
    .md-content pre code {
      padding: 0;
      background: transparent;
      color: inherit;
    }
    .md-content a {
      color: #ea580c;
      text-decoration: underline;
    }
    /* 防止技能详情展开后挤压聊天输入区 */
    #skill-detail {
      max-height: min(42vh, 420px);
      overflow-y: auto;
    }
    #skill-detail::-webkit-scrollbar { width: 6px; }
    #skill-detail::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden">
  <!-- 认证遮罩 -->
  <div id="auth-overlay" class="auth-overlay hidden">
    <div class="bg-white rounded-xl shadow-lg p-8 max-w-md w-full mx-4">
      <div class="text-center mb-6">
        <div class="text-4xl mb-3">🔐</div>
        <h2 class="font-bold text-xl text-gray-800">请输入访问密码</h2>
        <p class="text-sm text-gray-500 mt-2">密码配置在服务端 .env 文件</p>
      </div>
      <div class="space-y-4">
        <input 
          type="password" 
          id="auth-password" 
          placeholder="输入密码..."
          class="w-full border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400"
          onkeypress="handleAuthKeyPress(event)"
        >
        <button 
          onclick="verifyPassword()" 
          id="auth-btn"
          class="w-full bg-gradient-to-r from-orange-500 to-red-500 text-white py-3 rounded-lg hover:opacity-90 transition disabled:opacity-50"
        >
          验证
        </button>
        <p id="auth-error" class="text-red-500 text-sm text-center hidden">密码错误，请重试</p>
      </div>
    </div>
  </div>

  <!-- 主界面 -->
  <nav class="bg-gradient-to-r from-orange-500 to-red-500 text-white shadow-lg">
    <div class="max-w-4xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="text-2xl">🔥</div>
          <div>
            <h1 class="font-bold text-lg">赛博雪峰</h1>
            <p class="text-sm opacity-80">思维顾问 · 选择比努力更重要</p>
          </div>
        </div>
        <div class="flex gap-2">
          <button onclick="logout()" class="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg text-sm transition">
            🔐 退出
          </button>
          <button onclick="resetChat()" class="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg text-sm transition">
            🔄 重置
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto flex h-[calc(100vh-80px)] flex-col overflow-hidden p-4">
    <!-- 身份卡片（可折叠） -->
    <div id="skill-info" class="bg-white rounded-xl shadow-md mb-4 hidden shrink-0">
      <!-- 标题栏（可点击） -->
      <div class="flex items-center justify-between p-4 cursor-pointer hover:bg-gray-50 transition" onclick="toggleSkillInfo()">
        <div class="flex items-center gap-3">
          <div class="text-2xl">👨‍🏫</div>
          <div>
            <h2 class="font-bold text-gray-800" id="skill-name">加载中...</h2>
            <p class="text-sm text-gray-500">点击查看技能详情</p>
          </div>
        </div>
        <div id="skill-toggle-icon" class="text-gray-400 transition-transform">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </div>
      </div>
      <!-- 详情区域（默认隐藏） -->
      <div id="skill-detail" class="hidden border-t border-gray-200 px-4 pb-4">
        <p class="text-gray-600 mt-3 text-sm" id="skill-desc"></p>
        <div class="mt-3 grid gap-3 md:grid-cols-2">
          <div class="rounded-lg border border-orange-100 bg-orange-50 p-3">
            <p class="text-xs font-semibold tracking-wide text-orange-700">运行配置</p>
            <div class="mt-2 space-y-1 text-sm text-gray-700">
              <p>模型：<span id="skill-model" class="font-medium text-gray-900">加载中...</span></p>
              <p>搜索：<span id="skill-search-type" class="font-medium text-gray-900">加载中...</span></p>
            </div>
          </div>
          <div class="rounded-lg border border-gray-200 bg-gray-50 p-3">
            <p class="text-xs font-semibold tracking-wide text-gray-600">可用工具</p>
            <div id="skill-tools" class="mt-2 flex flex-wrap gap-2 text-xs text-gray-600">
              <span class="rounded-full bg-white px-2 py-1 ring-1 ring-gray-200">加载中...</span>
            </div>
          </div>
        </div>
        <div id="skill-tool-tips" class="mt-3 hidden rounded-lg border border-blue-100 bg-blue-50 p-3 text-sm text-blue-900"></div>
        <div class="mt-3 text-sm text-gray-500 bg-gray-50 rounded-lg p-3">
          ⚠️ 角色扮演基于张雪峰生前公开言论，非本人观点。2026年3月24日离世。
        </div>
      </div>
    </div>

    <!-- 对话区域 -->
    <div class="flex min-h-0 flex-1 flex-col bg-white rounded-xl shadow-md">
      <div id="chat-messages" class="chat-container min-h-0 flex-1 overflow-y-auto p-4 space-y-3">
        <div class="text-center text-gray-400 py-8">
          <div class="text-4xl mb-3">🎯</div>
          <p>用张雪峰的视角聊聊教育选择、职业规划、阶层流动</p>
          <p class="text-sm mt-2">例如：「我家孩子想学新闻学，靠谱吗？」</p>
        </div>
      </div>
      <div class="border-t border-gray-200 p-4">
        <div class="flex gap-3">
          <input 
            type="text" 
            id="user-input" 
            placeholder="输入你的问题..."
            class="flex-1 border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400"
            onkeypress="handleKeyPress(event)"
          >
          <button 
            onclick="sendMessage()" 
            id="send-btn"
            class="bg-gradient-to-r from-orange-500 to-red-500 text-white px-6 py-3 rounded-lg hover:opacity-90 transition disabled:opacity-50"
          >
            发送
          </button>
        </div>
      </div>
    </div>

    <!-- 快捷提示 -->
    <div class="mt-4 flex flex-wrap gap-2 shrink-0">
      <button onclick="quickAsk('我家孩子想学新闻学，靠谱吗？')" class="bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded-full text-sm transition">
        新闻学靠谱吗？
      </button>
      <button onclick="quickAsk('普通家庭孩子选什么专业最稳？')" class="bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded-full text-sm transition">
        最稳的专业？
      </button>
      <button onclick="quickAsk('AI时代，计算机专业还值得学吗？')" class="bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded-full text-sm transition">
        计算机还香吗？
      </button>
      <button onclick="quickAsk('文科生出路在哪里？')" class="bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded-full text-sm transition">
        文科出路？
      </button>
    </div>
  </main>

  <script>
    const API_URL = '/api/chat';
    const STORAGE_KEY = 'zhangxuefeng-chat-history';
    const AUTH_KEY = 'zhangxuefeng-auth';

    let chatHistory = [];
    let isLoading = false;
    let skillInfoExpanded = false;
    let activeStreamMessage = null;

    function getAuthToken() {
      const token = localStorage.getItem(AUTH_KEY);
      return token && token !== 'verified' ? token : null;
    }

    function authHeaders(extra = {}) {
      const token = getAuthToken();
      return token
        ? { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...extra }
        : { 'Content-Type': 'application/json', ...extra };
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuth();
    });

    // 展开/折叠技能信息
    function toggleSkillInfo() {
      skillInfoExpanded = !skillInfoExpanded;
      const detail = document.getElementById('skill-detail');
      const icon = document.getElementById('skill-toggle-icon');
      
      if (skillInfoExpanded) {
        detail.classList.remove('hidden');
        icon.style.transform = 'rotate(180deg)';
      } else {
        detail.classList.add('hidden');
        icon.style.transform = 'rotate(0deg)';
      }
    }

    async function checkAuth() {
      try {
        const statusRes = await fetch('/api/auth/status');
        const status = await statusRes.json();
        
        if (!status.required) {
          initApp();
          return;
        }
        
        const savedAuth = localStorage.getItem(AUTH_KEY);
        if (savedAuth === 'verified') {
          initApp();
          return;
        }
        
        document.getElementById('auth-overlay').classList.remove('hidden');
      } catch (e) {
        console.error('Auth check failed:', e);
        initApp();
      }
    }

    async function verifyPassword() {
      const password = document.getElementById('auth-password').value.trim();
      const btn = document.getElementById('auth-btn');
      const error = document.getElementById('auth-error');
      
      if (!password) return;
      
      btn.disabled = true;
      btn.textContent = '验证中...';
      error.classList.add('hidden');
      
      try {
        const res = await fetch('/api/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem(AUTH_KEY, password);
          document.getElementById('auth-overlay').classList.add('hidden');
          initApp();
        } else {
          error.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = '验证';
        }
      } catch (e) {
        error.textContent = '网络错误';
        error.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '验证';
      }
    }

    function handleAuthKeyPress(e) {
      if (e.key === 'Enter') verifyPassword();
    }

    async function initApp() {
      loadHistory();
      renderMessages();
      
      try {
        const res = await fetch('/api/skill/info', { headers: authHeaders() });
        const data = await res.json();
        if (data.success) {
          document.getElementById('skill-info').classList.remove('hidden');
          document.getElementById('skill-name').textContent = data.skill.name;
          document.getElementById('skill-desc').textContent = data.skill.description;
          renderSkillMeta(data.skill);
        }
      } catch (e) {
        console.error('Failed to load skill info:', e);
      }
    }

    function renderSkillMeta(skill) {
      document.getElementById('skill-model').textContent = skill.model || '未配置';
      document.getElementById('skill-search-type').textContent = skill.searchType || '无';

      const tools = Array.isArray(skill.tools) ? skill.tools : [];
      const toolsContainer = document.getElementById('skill-tools');
      toolsContainer.innerHTML = tools.length
        ? tools.map(tool => `
            <span class="rounded-full bg-white px-2 py-1 ring-1 ring-gray-200">${escapeHtml(tool)}</span>
          `).join('')
        : '<span class="rounded-full bg-white px-2 py-1 ring-1 ring-gray-200">无</span>';

      const tips = [];
      if (tools.includes('read_skill_file')) {
        tips.push('`read_skill_file`：按需读取当前技能目录下的补充资料，例如 references/research 下的文件。');
      }
      if (tools.includes('web_search')) {
        tips.push('`web_search`：查询最新公开数据，用于补充时效性信息。');
      }

      const tipsContainer = document.getElementById('skill-tool-tips');
      if (tips.length > 0) {
        tipsContainer.classList.remove('hidden');
        tipsContainer.innerHTML = tips.map(tip => `<p>${tip}</p>`).join('');
      } else {
        tipsContainer.classList.add('hidden');
        tipsContainer.innerHTML = '';
      }
    }

    function loadHistory() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) chatHistory = JSON.parse(saved);
      } catch (e) {
        chatHistory = [];
      }
    }

    function saveHistory() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
    }

    function getChatContainer() {
      return document.getElementById('chat-messages');
    }

    function scrollChatToBottom() {
      const container = getChatContainer();
      requestAnimationFrame(() => {
        container.scrollTop = container.scrollHeight;
      });
    }

    function createEmptyStateElement() {
      const wrapper = document.createElement('div');
      wrapper.className = 'text-center text-gray-400 py-8';
      wrapper.innerHTML = `
        <div class="text-4xl mb-3">🎯</div>
        <p>用张雪峰的视角聊聊教育选择、职业规划、阶层流动</p>
        <p class="text-sm mt-2">例如：「我家孩子想学新闻学，靠谱吗？」</p>
      `;
      return wrapper;
    }

    function createMessageElement(role, content, options = {}) {
      const row = document.createElement('div');
      row.className = `message-enter ${role === 'human' ? 'flex justify-end' : ''}`;

      const bubble = document.createElement('div');
      bubble.className = role === 'human'
        ? 'bg-orange-100 text-gray-800 rounded-xl px-4 py-3 max-w-[80%]'
        : 'bg-gray-50 text-gray-800 rounded-xl px-4 py-3 max-w-[90%]';

      const contentDiv = document.createElement('div');
      contentDiv.className = role === 'human' ? 'text-sm whitespace-pre-wrap' : 'md-content text-sm';
      renderMessageContent(contentDiv, role, content || '');

      bubble.appendChild(contentDiv);
      row.appendChild(bubble);

      if (options.pending) {
        bubble.dataset.pending = 'true';
      }

      return { row, bubble, contentDiv };
    }

    function createTypingIndicator() {
      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator flex gap-1';
      indicator.innerHTML = `
        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
      `;
      return indicator;
    }

    function createTypingIndicatorElement() {
      const row = document.createElement('div');
      row.className = 'message-enter';

      const bubble = document.createElement('div');
      bubble.className = 'bg-gray-50 text-gray-800 rounded-xl px-4 py-3 max-w-[90%]';

      const indicator = createTypingIndicator();

      bubble.appendChild(indicator);
      row.appendChild(bubble);

      return { row, bubble };
    }

    function clearPendingStreamMessage() {
      if (activeStreamMessage?.row?.parentNode) {
        activeStreamMessage.row.parentNode.removeChild(activeStreamMessage.row);
      }
      activeStreamMessage = null;
    }

    function ensureEmptyState() {
      const container = getChatContainer();
      if (!container.children.length) {
        container.appendChild(createEmptyStateElement());
      }
    }

    function removeEmptyState() {
      const container = getChatContainer();
      const firstChild = container.firstElementChild;
      if (firstChild && firstChild.classList.contains('text-center')) {
        container.removeChild(firstChild);
      }
    }

    function renderMessages() {
      const container = getChatContainer();
      container.innerHTML = '';
      clearPendingStreamMessage();

      if (chatHistory.length === 0) {
        ensureEmptyState();
        return;
      }

      chatHistory.forEach((msg) => {
        const element = createMessageElement(msg.role, msg.content);
        container.appendChild(element.row);
      });

      scrollChatToBottom();
    }

    function appendMessage(role, content) {
      removeEmptyState();
      const container = getChatContainer();
      const element = createMessageElement(role, content);
      container.appendChild(element.row);
      scrollChatToBottom();
      return element;
    }

    function startPendingAiMessage() {
      removeEmptyState();
      clearPendingStreamMessage();

      const container = getChatContainer();
      const element = createTypingIndicatorElement();
      container.appendChild(element.row);
      activeStreamMessage = {
        ...element,
        content: '',
        isTyping: true,
      };
      scrollChatToBottom();
    }

    function updatePendingAiMessage(content) {
      if (!activeStreamMessage) {
        startPendingAiMessage();
      }

      if (activeStreamMessage.isTyping) {
        const contentWrapper = document.createElement('div');
        contentWrapper.className = 'space-y-3';

        const contentDiv = document.createElement('div');
        contentDiv.className = 'md-content text-sm';
        
        const statusDiv = document.createElement('div');
        statusDiv.className = 'inline-flex items-center gap-2 text-xs text-gray-400';

        const statusText = document.createElement('span');
        statusText.textContent = '继续生成中';

        const indicator = createTypingIndicator();
        indicator.className = 'typing-indicator flex gap-1 scale-75 origin-left';

        statusDiv.appendChild(statusText);
        statusDiv.appendChild(indicator);
        contentWrapper.appendChild(contentDiv);
        contentWrapper.appendChild(statusDiv);

        activeStreamMessage.bubble.innerHTML = '';
        activeStreamMessage.bubble.appendChild(contentWrapper);
        activeStreamMessage.contentDiv = contentDiv;
        activeStreamMessage.statusDiv = statusDiv;
        activeStreamMessage.isTyping = false;
      }

      activeStreamMessage.content = content;
      renderMessageContent(activeStreamMessage.contentDiv, 'ai', content);
      scrollChatToBottom();
    }

    function finishPendingAiMessage(finalContent) {
      const content = finalContent || activeStreamMessage?.content || '';
      clearPendingStreamMessage();

      if (!content) {
        ensureEmptyState();
        return;
      }

      appendMessage('ai', content);
    }

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const message = input.value.trim();
      
      if (!message || isLoading) return;

      input.value = '';
      setLoading(true);

      chatHistory.push({ role: 'human', content: message });
      appendMessage('human', message);
      saveHistory();
      startPendingAiMessage();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({
            message,
            history: chatHistory.slice(0, -1),
            stream: true,
          })
        });

        if (!res.ok || !res.body) {
          throw new Error('响应异常');
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalReply = '';
        let streamedReply = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const events = buffer.split('\n\n');
          buffer = events.pop() || '';

          for (const eventText of events) {
            const dataLine = eventText
              .split('\n')
              .find(line => line.startsWith('data: '));

            if (!dataLine) continue;

            const payload = JSON.parse(dataLine.slice(6));
            if (payload.type === 'chunk') {
              streamedReply += payload.content;
              updatePendingAiMessage(streamedReply);
            } else if (payload.type === 'done') {
              finalReply = payload.reply || streamedReply;
            } else if (payload.type === 'error') {
              throw new Error(payload.error || '流式输出失败');
            }
          }
        }

        const aiReply = finalReply || streamedReply || '抱歉，未收到有效回复';
        chatHistory.push({ role: 'ai', content: aiReply });
        finishPendingAiMessage(aiReply);
      } catch (e) {
        const errorReply = '抱歉，出错了：' + (e.message || '网络错误，请稍后重试');
        chatHistory.push({ role: 'ai', content: errorReply });
        finishPendingAiMessage(errorReply);
      }

      saveHistory();
      setLoading(false);
    }

    function setLoading(loading) {
      isLoading = loading;
      const btn = document.getElementById('send-btn');
      
      btn.disabled = loading;
      btn.textContent = loading ? '...' : '发送';
    }

    function resetChat() {
      if (confirm('确定要清空对话历史吗？')) {
        chatHistory = [];
        localStorage.removeItem(STORAGE_KEY);
        clearPendingStreamMessage();
        renderMessages();
        fetch('/api/chat/reset', { method: 'POST', headers: authHeaders() }).catch(() => {});
      }
    }

    function logout() {
      localStorage.removeItem(AUTH_KEY);
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }

    function quickAsk(question) {
      document.getElementById('user-input').value = question;
      sendMessage();
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter' && !e.shiftKey) sendMessage();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderMarkdown(text) {
      if (!window.marked) {
        return escapeHtml(text).replace(/\n/g, '<br>');
      }

      return marked.parse(text, {
        breaks: true,
        gfm: true,
      });
    }

    function renderMessageContent(element, role, content) {
      if (role === 'human') {
        element.textContent = content;
        return;
      }

      element.innerHTML = renderMarkdown(content);
    }
  </script>
</body>
</html>
