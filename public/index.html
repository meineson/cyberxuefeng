<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛博雪峰 - 思维顾问</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .chat-container::-webkit-scrollbar { width: 6px; }
    .chat-container::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    .message-enter { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .typing-indicator span {
      animation: blink 1.4s infinite;
      animation-fill-mode: both;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- 认证遮罩 -->
  <div id="auth-overlay" class="auth-overlay hidden">
    <div class="bg-white rounded-xl shadow-lg p-8 max-w-md w-full mx-4">
      <div class="text-center mb-6">
        <div class="text-4xl mb-3">🔐</div>
        <h2 class="font-bold text-xl text-gray-800">请输入访问密码</h2>
        <p class="text-sm text-gray-500 mt-2">密码配置在服务端 .env 文件</p>
      </div>
      <div class="space-y-4">
        <input 
          type="password" 
          id="auth-password" 
          placeholder="输入密码..."
          class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400"
          onkeypress="handleAuthKeyPress(event)"
        >
        <button 
          onclick="verifyPassword()" 
          id="auth-btn"
          class="w-full bg-gradient-to-r from-orange-500 to-red-500 text-white py-3 rounded-lg hover:opacity-90 transition disabled:opacity-50"
        >
          验证
        </button>
        <p id="auth-error" class="text-red-500 text-sm text-center hidden">密码错误，请重试</p>
      </div>
    </div>
  </div>

  <!-- 主界面 -->
  <nav class="bg-gradient-to-r from-orange-500 to-red-500 text-white shadow-lg">
    <div class="max-w-4xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="text-2xl">🔥</div>
          <div>
            <h1 class="font-bold text-lg">赛博雪峰</h1>
            <p class="text-sm opacity-80">思维顾问 · 选择比努力更重要</p>
          </div>
        </div>
        <div class="flex gap-2">
          <button onclick="logout()" class="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg text-sm transition">
            🔐 退出
          </button>
          <button onclick="resetChat()" class="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg text-sm transition">
            🔄 重置
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto p-4">
    <!-- 身份卡片（可折叠） -->
    <div id="skill-info" class="bg-white rounded-xl shadow-md mb-4 hidden">
      <!-- 标题栏（可点击） -->
      <div class="flex items-center justify-between p-4 cursor-pointer hover:bg-gray-50 transition" onclick="toggleSkillInfo()">
        <div class="flex items-center gap-3">
          <div class="text-2xl">👨‍🏫</div>
          <div>
            <h2 class="font-bold text-gray-800" id="skill-name">加载中...</h2>
            <p class="text-sm text-gray-500">点击查看技能详情</p>
          </div>
        </div>
        <div id="skill-toggle-icon" class="text-gray-400 transition-transform">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </div>
      </div>
      <!-- 详情区域（默认隐藏） -->
      <div id="skill-detail" class="hidden border-t px-4 pb-4">
        <p class="text-gray-600 mt-3 text-sm" id="skill-desc"></p>
        <div class="mt-3 text-sm text-gray-500 bg-gray-50 rounded-lg p-3">
          ⚠️ 角色扮演基于张雪峰生前公开言论，非本人观点。2026年3月24日离世。
        </div>
      </div>
    </div>

    <!-- 对话区域 -->
    <div class="bg-white rounded-xl shadow-md">
      <div id="chat-messages" class="chat-container h-[400px] overflow-y-auto p-4 space-y-3">
        <div class="text-center text-gray-400 py-8">
          <div class="text-4xl mb-3">🎯</div>
          <p>用张雪峰的视角聊聊教育选择、职业规划、阶层流动</p>
          <p class="text-sm mt-2">例如：「我家孩子想学新闻学，靠谱吗？」</p>
        </div>
      </div>
      <div class="border-t p-4">
        <div class="flex gap-3">
          <input 
            type="text" 
            id="user-input" 
            placeholder="输入你的问题..."
            class="flex-1 border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400"
            onkeypress="handleKeyPress(event)"
          >
          <button 
            onclick="sendMessage()" 
            id="send-btn"
            class="bg-gradient-to-r from-orange-500 to-red-500 text-white px-6 py-3 rounded-lg hover:opacity-90 transition disabled:opacity-50"
          >
            发送
          </button>
        </div>
      </div>
    </div>

    <!-- 快捷提示 -->
    <div class="mt-4 flex flex-wrap gap-2">
      <button onclick="quickAsk('我家孩子想学新闻学，靠谱吗？')" class="bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded-full text-sm transition">
        新闻学靠谱吗？
      </button>
      <button onclick="quickAsk('普通家庭孩子选什么专业最稳？')" class="bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded-full text-sm transition">
        最稳的专业？
      </button>
      <button onclick="quickAsk('AI时代，计算机专业还值得学吗？')" class="bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded-full text-sm transition">
        计算机还香吗？
      </button>
      <button onclick="quickAsk('文科生出路在哪里？')" class="bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded-full text-sm transition">
        文科出路？
      </button>
    </div>
  </main>

  <script>
    const API_URL = '/api/chat';
    const STORAGE_KEY = 'zhangxuefeng-chat-history';
    const AUTH_KEY = 'zhangxuefeng-auth';

    let chatHistory = [];
    let isLoading = false;
    let skillInfoExpanded = false;

    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuth();
    });

    // 展开/折叠技能信息
    function toggleSkillInfo() {
      skillInfoExpanded = !skillInfoExpanded;
      const detail = document.getElementById('skill-detail');
      const icon = document.getElementById('skill-toggle-icon');
      
      if (skillInfoExpanded) {
        detail.classList.remove('hidden');
        icon.style.transform = 'rotate(180deg)';
      } else {
        detail.classList.add('hidden');
        icon.style.transform = 'rotate(0deg)';
      }
    }

    async function checkAuth() {
      try {
        const statusRes = await fetch('/api/auth/status');
        const status = await statusRes.json();
        
        if (!status.required) {
          initApp();
          return;
        }
        
        const savedAuth = localStorage.getItem(AUTH_KEY);
        if (savedAuth === 'verified') {
          initApp();
          return;
        }
        
        document.getElementById('auth-overlay').classList.remove('hidden');
      } catch (e) {
        console.error('Auth check failed:', e);
        initApp();
      }
    }

    async function verifyPassword() {
      const password = document.getElementById('auth-password').value.trim();
      const btn = document.getElementById('auth-btn');
      const error = document.getElementById('auth-error');
      
      if (!password) return;
      
      btn.disabled = true;
      btn.textContent = '验证中...';
      error.classList.add('hidden');
      
      try {
        const res = await fetch('/api/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem(AUTH_KEY, 'verified');
          document.getElementById('auth-overlay').classList.add('hidden');
          initApp();
        } else {
          error.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = '验证';
        }
      } catch (e) {
        error.textContent = '网络错误';
        error.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '验证';
      }
    }

    function handleAuthKeyPress(e) {
      if (e.key === 'Enter') verifyPassword();
    }

    async function initApp() {
      loadHistory();
      renderMessages();
      
      try {
        const res = await fetch('/api/skill/info');
        const data = await res.json();
        if (data.success) {
          document.getElementById('skill-info').classList.remove('hidden');
          document.getElementById('skill-name').textContent = data.skill.name;
          document.getElementById('skill-desc').textContent = data.skill.description;
        }
      } catch (e) {
        console.error('Failed to load skill info:', e);
      }
    }

    function loadHistory() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) chatHistory = JSON.parse(saved);
      } catch (e) {
        chatHistory = [];
      }
    }

    function saveHistory() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
    }

    function renderMessages() {
      const container = document.getElementById('chat-messages');
      
      if (chatHistory.length === 0) {
        container.innerHTML = `
          <div class="text-center text-gray-400 py-8">
            <div class="text-4xl mb-3">🎯</div>
            <p>用张雪峰的视角聊聊教育选择、职业规划、阶层流动</p>
            <p class="text-sm mt-2">例如：「我家孩子想学新闻学，靠谱吗？」</p>
          </div>
        `;
        return;
      }

      container.innerHTML = chatHistory.map(msg => `
        <div class="message-enter ${msg.role === 'human' ? 'flex justify-end' : ''}">
          <div class="${msg.role === 'human' 
            ? 'bg-orange-100 text-gray-800 rounded-xl px-4 py-3 max-w-[80%]'
            : 'bg-gray-50 text-gray-800 rounded-xl px-4 py-3 max-w-[90%]'}">
            <div class="text-sm whitespace-pre-wrap">${escapeHtml(msg.content)}</div>
          </div>
        </div>
      `).join('');

      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const message = input.value.trim();
      
      if (!message || isLoading) return;

      input.value = '';
      setLoading(true);

      chatHistory.push({ role: 'human', content: message });
      renderMessages();
      saveHistory();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            history: chatHistory.slice(0, -1)
          })
        });

        const data = await res.json();
        
        if (data.success) {
          chatHistory.push({ role: 'ai', content: data.reply });
        } else {
          chatHistory.push({ role: 'ai', content: '抱歉，出错了：' + data.error });
        }
      } catch (e) {
        chatHistory.push({ role: 'ai', content: '网络错误，请稍后重试' });
      }

      renderMessages();
      saveHistory();
      setLoading(false);
    }

    function setLoading(loading) {
      isLoading = loading;
      const btn = document.getElementById('send-btn');
      const container = document.getElementById('chat-messages');
      
      btn.disabled = loading;
      btn.textContent = loading ? '...' : '发送';

      if (loading) {
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message-enter';
        loadingDiv.innerHTML = `
          <div class="bg-gray-50 rounded-xl px-4 py-3">
            <div class="typing-indicator flex gap-1">
              <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
              <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
              <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
            </div>
          </div>
        `;
        container.appendChild(loadingDiv);
        container.scrollTop = container.scrollHeight;
      }
    }

    function resetChat() {
      if (confirm('确定要清空对话历史吗？')) {
        chatHistory = [];
        localStorage.removeItem(STORAGE_KEY);
        renderMessages();
        fetch('/api/chat/reset', { method: 'POST' }).catch(() => {});
      }
    }

    function logout() {
      localStorage.removeItem(AUTH_KEY);
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }

    function quickAsk(question) {
      document.getElementById('user-input').value = question;
      sendMessage();
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter' && !e.shiftKey) sendMessage();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
